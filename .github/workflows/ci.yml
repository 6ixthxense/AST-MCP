name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci || npm install
      - run: npm run build
      - run: npm test
      - run: node test/graph-smoke.mjs && node test/resolver-smoke.mjs && node test/callgraph-smoke.mjs
