# Architecture gate: builds from source and validates the src/ directory.
name: Architecture
on: [pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci || npm install
      - run: npm run build
      - run: node dist/cli.js validate src --max-lines 400 --max-imports 20 --max-exports 15
