<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0b12"/>
      <stop offset="100%" stop-color="#0d0f1a"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="38%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="r1" cx="80%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="r2" cx="5%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="logo-clip">
      <rect width="60" height="60" rx="16"/>
    </clipPath>
    <filter id="glow-filter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#r1)"/>
  <rect width="1200" height="630" fill="url(#r2)"/>

  <!-- Grid dots subtle pattern -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#23273a"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)" opacity="0.6"/>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="#23273a" stroke-width="2"/>

  <!-- Logo icon -->
  <g transform="translate(80, 80)">
    <rect width="60" height="60" rx="16" fill="url(#grad)" filter="url(#glow-filter)"/>
    <!-- AST tree icon: 3 nodes + edges -->
    <circle cx="30" cy="12" r="5.5" fill="white"/>
    <circle cx="14" cy="46" r="5.5" fill="white"/>
    <circle cx="46" cy="46" r="5.5" fill="white"/>
    <line x1="30" y1="17.5" x2="14" y2="40.5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="30" y1="17.5" x2="46" y2="40.5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  </g>

  <!-- Brand name -->
  <text x="158" y="108" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-weight="800" font-size="34" fill="white" letter-spacing="-0.5">AST-MCP</text>
  <text x="158" y="134" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="16" fill="#6b7390" letter-spacing="0.5">universal-ast-mapper · v2.0.6 · MIT</text>

  <!-- Main headline -->
  <text x="80" y="240" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-weight="900" font-size="64" fill="white" letter-spacing="-2">Let AI agents</text>
  <text x="80" y="320" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-weight="900" font-size="64" letter-spacing="-2" fill="url(#grad)">understand any codebase</text>
  <text x="80" y="400" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-weight="900" font-size="64" fill="white" letter-spacing="-2">without reading every file.</text>

  <!-- Sub -->
  <text x="80" y="455" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="22" fill="#98a1bd">
    MCP server + CLI built on tree-sitter. Real AST parsing. Zero regex guessing.
  </text>

  <!-- Stat pills -->
  <!-- Pill 1: 44 tools -->
  <rect x="80" y="496" width="168" height="48" rx="12" fill="#12141f" stroke="#2e3450" stroke-width="1.5"/>
  <text x="100" y="526" font-family="system-ui,sans-serif" font-weight="900" font-size="22" fill="url(#grad)">44</text>
  <text x="130" y="526" font-family="system-ui,sans-serif" font-size="16" fill="#98a1bd">MCP tools</text>

  <!-- Pill 2: 49 CLI -->
  <rect x="260" y="496" width="178" height="48" rx="12" fill="#12141f" stroke="#2e3450" stroke-width="1.5"/>
  <text x="280" y="526" font-family="system-ui,sans-serif" font-weight="900" font-size="22" fill="url(#grad)">49</text>
  <text x="312" y="526" font-family="system-ui,sans-serif" font-size="16" fill="#98a1bd">CLI commands</text>

  <!-- Pill 3: 16 langs -->
  <rect x="450" y="496" width="160" height="48" rx="12" fill="#12141f" stroke="#2e3450" stroke-width="1.5"/>
  <text x="470" y="526" font-family="system-ui,sans-serif" font-weight="900" font-size="22" fill="url(#grad)">16</text>
  <text x="502" y="526" font-family="system-ui,sans-serif" font-size="16" fill="#98a1bd">languages</text>

  <!-- Pill 4: 60× cache -->
  <rect x="622" y="496" width="190" height="48" rx="12" fill="#12141f" stroke="#2e3450" stroke-width="1.5"/>
  <text x="642" y="526" font-family="system-ui,sans-serif" font-weight="900" font-size="22" fill="url(#grad)">60×</text>
  <text x="690" y="526" font-family="system-ui,sans-serif" font-size="16" fill="#98a1bd">warm cache</text>

  <!-- Right decorative: code skeleton preview -->
  <g transform="translate(860, 80)">
    <rect width="260" height="390" rx="14" fill="#12141f" stroke="#23273a" stroke-width="1.5"/>
    <!-- Bar -->
    <rect width="260" height="36" rx="14" fill="#0e1018"/>
    <rect y="22" width="260" height="14" fill="#0e1018"/>
    <circle cx="18" cy="18" r="5" fill="#ff5f57"/>
    <circle cx="34" cy="18" r="5" fill="#febc2e"/>
    <circle cx="50" cy="18" r="5" fill="#28c840"/>
    <text x="90" y="23" font-family="monospace" font-size="11" fill="#6b7390">auth.ts — skeleton</text>
    <!-- Code lines -->
    <g transform="translate(18, 54)" font-family="monospace" font-size="11.5">
      <text fill="#6b7390">// imports</text>
      <text y="22" fill="#a78bfa">import</text><text x="52" y="22" fill="#e8ebf5"> prisma</text><text x="107" y="22" fill="#6b7390"> from</text><text x="136" y="22" fill="#34d399"> "./db"</text>
      <text y="50" fill="#22d3ee">function</text><text x="68" y="50" fill="#e8ebf5"> validateSession</text><text x="197" y="50" fill="#6b7390">(</text>
      <text x="12" y="68" fill="#e8ebf5">token</text><text x="50" y="68" fill="#6b7390">: </text><text x="60" y="68" fill="#22d3ee">string</text>
      <text y="86" fill="#6b7390">) {</text>
      <text x="12" y="110" fill="#6b7390">range:</text><text x="50" y="110" fill="#e8ebf5"> 12–34</text>
      <text y="128" fill="#6b7390">}</text>

      <text y="156" fill="#22d3ee">function</text><text x="68" y="156" fill="#e8ebf5"> createSession</text><text x="182" y="156" fill="#6b7390">(</text>
      <text x="12" y="174" fill="#e8ebf5">userId</text><text x="57" y="174" fill="#6b7390">: </text><text x="67" y="174" fill="#22d3ee">string</text>
      <text y="192" fill="#6b7390">) {</text>
      <text x="12" y="210" fill="#6b7390">range:</text><text x="50" y="210" fill="#e8ebf5"> 36–58</text>
      <text y="228" fill="#6b7390">}</text>

      <text y="256" fill="#6b7390">// 300 lines → 40 lines skeleton</text>
      <rect x="0" y="270" width="224" height="2" rx="1" fill="url(#grad)" opacity="0.6"/>
      <text y="292" fill="#6b7390">symbolCount:</text><text x="100" y="292" fill="#34d399"> 4</text>
      <text y="310" fill="#6b7390">tokenEstimate:</text><text x="110" y="310" fill="#34d399"> 56</text>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="#0e1018" opacity="0.8"/>
  <text x="80" y="620" font-family="monospace" font-size="13" fill="#6b7390">github.com/6ixthxense/AST-MCP</text>
  <text x="1120" y="620" font-family="monospace" font-size="13" fill="#6b7390" text-anchor="end">npm: universal-ast-mapper</text>
</svg>
