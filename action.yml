name: "AST-MCP Validate"
description: "Run ast-map architecture validation, quality gate, and/or post a health score comment on PRs."
author: "6ixthxense"
branding:
  icon: "git-branch"
  color: "purple"
inputs:
  path:
    description: "File or directory to validate."
    required: false
    default: "src"
  version:
    description: "npm version/tag of universal-ast-mapper to run."
    required: false
    default: "latest"
  mode:
    description: "validate (structural rules), check (quality gate), both, or pr-comment (post health diff on PRs)."
    required: false
    default: "validate"
  max-lines:
    description: "[validate] Max lines per file before a large-file warning."
    required: false
    default: "400"
  max-imports:
    description: "[validate] Max imports per file before a too-many-imports warning."
    required: false
    default: "20"
  max-exports:
    description: "[validate] Max exports per file before a god-export warning."
    required: false
    default: "15"
  check-args:
    description: "[check] Extra flags for ast-map check (e.g. --min-score 70 --max-cycles 0). Baseline is read from .ast-map.baseline.json in the repo."
    required: false
    default: ""
  github-token:
    description: "[pr-comment] GitHub token for posting PR comments (use secrets.GITHUB_TOKEN)."
    required: false
    default: ""
  comment-header:
    description: "[pr-comment] Custom header for the PR comment."
    required: false
    default: "## AST Map Health Report"
runs:
  using: "composite"
  steps:
    - name: Run ast-map validate
      if: ${{ inputs.mode == 'validate' || inputs.mode == 'both' }}
      shell: bash
      run: >
        npm exec --package=universal-ast-mapper@${{ inputs.version }} --yes -- ast-map validate "${{ inputs.path }}"
        --max-lines ${{ inputs.max-lines }}
        --max-imports ${{ inputs.max-imports }}
        --max-exports ${{ inputs.max-exports }}

    - name: Run ast-map check (quality gate)
      if: ${{ inputs.mode == 'check' || inputs.mode == 'both' }}
      shell: bash
      run: >
        npm exec --package=universal-ast-mapper@${{ inputs.version }} --yes -- ast-map check "${{ inputs.path }}"
        ${{ inputs.check-args }}

    - name: Generate health report JSON (pr-comment)
      if: ${{ inputs.mode == 'pr-comment' && github.event_name == 'pull_request' }}
      shell: bash
      id: ast_report
      run: |
        npm exec --package=universal-ast-mapper@${{ inputs.version }} --yes -- \
          ast-map report "${{ inputs.path }}" --json > /tmp/ast-report-head.json 2>/dev/null || echo '{}' > /tmp/ast-report-head.json

        # If the baseline file exists, run report on base branch too
        if git rev-parse origin/${{ github.base_ref }} >/dev/null 2>&1; then
          git stash -q 2>/dev/null || true
          git checkout -q origin/${{ github.base_ref }} -- "${{ inputs.path }}" 2>/dev/null || true
          npm exec --package=universal-ast-mapper@${{ inputs.version }} --yes -- \
            ast-map report "${{ inputs.path }}" --json > /tmp/ast-report-base.json 2>/dev/null || echo '{}' > /tmp/ast-report-base.json
          git checkout -q HEAD -- "${{ inputs.path }}" 2>/dev/null || true
          git stash pop -q 2>/dev/null || true
        else
          cp /tmp/ast-report-head.json /tmp/ast-report-base.json
        fi

        # Build the comment body using node
        node - <<'EOF'
        const head = JSON.parse(require('fs').readFileSync('/tmp/ast-report-head.json','utf8'));
        const base = JSON.parse(require('fs').readFileSync('/tmp/ast-report-base.json','utf8'));

        const score = h => h.score ?? '?';
        const grade = h => h.grade ?? '?';
        const delta = (head.score != null && base.score != null)
          ? head.score - base.score : null;
        const deltaStr = delta == null ? '' : delta > 0 ? ` ↑${delta}` : delta < 0 ? ` ↓${Math.abs(delta)}` : ' →0';
        const emoji = (head.score ?? 0) >= 80 ? '🟢' : (head.score ?? 0) >= 60 ? '🟡' : '🔴';

        const lines = [
          '${{ inputs.comment-header }}',
          '',
          `${emoji} **Score: ${score(head)}/100 (${grade(head)})${deltaStr}**`,
          '',
          '| Metric | Value |',
          '|--------|-------|',
          `| Files | ${head.files ?? '?'} |`,
          `| Symbols | ${head.symbols ?? '?'} |`,
          `| Dead exports | ${head.deadExports ?? '?'} |`,
          `| Circular deps | ${head.cyclicGroups ?? '?'} |`,
          `| Max complexity | ${head.maxComplexity ?? '?'} |`,
          `| Test coverage | ${head.testCoverage ? Math.round((head.testCoverage.coverageRatio ?? 0) * 100) + '%' : '?'} |`,
        ];

        if (head.smells?.length) lines.push('', `⚠️ **${head.smells.length} code smell(s)** detected`);
        if (head.security?.length) lines.push(`🔒 **${head.security.length} security issue(s)** detected`);

        lines.push('', `<sub>Generated by [ast-map](https://github.com/6ixthxense/AST-MCP) v${head.version ?? '?'}</sub>`);

        require('fs').writeFileSync('/tmp/ast-comment.md', lines.join('\n'));
        console.log('Comment ready.');
        EOF

        echo "comment_path=/tmp/ast-comment.md" >> "$GITHUB_OUTPUT"

    - name: Post PR comment
      if: ${{ inputs.mode == 'pr-comment' && github.event_name == 'pull_request' && inputs.github-token != '' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: |
        BODY=$(cat /tmp/ast-comment.md)
        # Find existing comment to update
        COMMENT_ID=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --jq \
          '[.[] | select(.body | startswith("${{ inputs.comment-header }}"))] | first | .id // empty')
        if [ -n "$COMMENT_ID" ]; then
          gh api --method PATCH "repos/${REPO}/issues/comments/${COMMENT_ID}" -f body="$BODY"
        else
          gh api --method POST "repos/${REPO}/issues/${PR_NUMBER}/comments" -f body="$BODY"
        fi
